front:
  text: 紙舟先生全眞直指
  hash: sha256:48aeb3c50f0d5e2892f48969661589c6b7d0f75f7256b96f717db0c31c89881e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0243_SJB_000-040382b, image: sjb/04/040382b.png}
body:
  text: 嗣全眞正宗金月巖編嗣全眞大癡黄公望傅夫全眞之學直究玄宗乃單明向上大道非小乗衆學雜術之比自五祖七真岀而天下得道者皆直指自證以心印心而不立片文隻字其妙在此後世有學者衆其所師得人則其說皆合符莭所師非人或受頑坐枯心或吞精咽氣或存心想腎或雜傍門非徒無益而又害之且全眞把柄於父母未生前眞巳全矣生亦不增死亦不減若人以心印空覺悟本眞則眞自全金丹之道具而大藥之基立矣或謂金丹乃神仙之道必有口授師傳宻語或指大道謂之單脩性宗不違命宗不得成仙道今爲大衆破此一疑謂如魚化為龍朽麥化爲蝴蝶雀入水化為蛤蛤化爲飛鶉貞女化為石彼此以有情而化無情無情而化有情或自己一念堅固而化爲觸隂陽二炁而化以物性論則有飛潜動植之不同以形質論則有鱗甲羽毛之差别其神竒不測也如此安有所謂眞師宻傳口授之妙物之較人天地懸隔人爲萬物之靈若能悟全眞之妙念念相續専炁致柔照一靈而不昩返六用以無衣守一忘一至虚而靜極静極則性停性停則命住命住則丹成丹成則神變無方矣人之化仙即與物之念堅觸炁而變化無有異也其柰今之學者根器淺小信道不篤疑情日生正因日滅不下苦工夫希望立地成道殊不思立地成道之人皆是千生萬世栽培善果到此時行滿功成立地成道矣今凡肉質行既不正功又不脩若欲丹道立成遠之遠矣今将七眞形神俱妙七返合同印子入室節目開列子後未免雲翳虚空無風起浪謂如不信貧道此語直待鍾吕親傳也只得一半如何是那一半石女飛行木人稱喚金丹之祖罔象起天地全眞亘古今造化之宗便從這裏入切忌外追尋道自虚無生一炁一炁隂陽萬象全若是當家能領會何須更覔水中鉛本是一團血肉惺惺全借陽神超居言語是誰靈神去更無把柄説岀萬般名相教人轉入迷津自從今日悟全眞妙語竒言不信光徹虚空上下人人具足無虧全眞眞裏露眞機實證無為不二掃去閑名野字胷中莫滯些兒七眞五祖只如斯悟得眞超聖地神陽形神隻證實悟至眞魂乃陽神魄乃隂形形借神靈月望日明日魂形隂子常戀母婦順夫行形神定交隂陽立根念念相續久久自靈月魄脩證不輟髙超玉京七返七眞合同印子平生醉夢走長途形神相顧忽起相看識得渠入道初眞覿面更無廻避處當機始㑹别親踈一日相知得至眞形神相伴從今賔主轉相親名曰得眞茫茫宇宙人無數誰信三冬火裏水子母親情豈忍離形神相入同行同坐更同衣名曰守眞若非轉面些兒子笑殺寒山拾得妻全是眞陽抱住隂形神相抱不勞相作妄思㝷名曰全眞一毫才動丹飛走此是長生水裏金錦袍玉勒五花兒形神俱妙幾度桃源徃復回與道合眞踏翠穿紅成底事如今休歇巳忘歸掣開金鎻兩頭空形神雙捨不與寥寥太極同名曰證眞倒握廣寒歸溟涬兩襟星斗動五風鼓棹迎棹徃復回普度後學有縁即上此舟來以眞覺眞眞超彼岸成眞覺自利須教更利他入室節目築室闊狹各有定例一入室大抵要神凝氣聚眞炁足而神自靈靈則變化矣然凝神聚氣全在清淨不可不慎小莭而妨大事然濁肉食濁氣腥莱助瞋怒五味奪元精可皆戒之不可以為無害不妨大道否則氣不清而神不安神不安而無所成矣一初坐多昏節飮食則氣踈道虚心則神淸静一昏困到不須行走則勞神勞神則氣散氣散則神昏於巳有道於道無益如昏困時但當起身緩行數歩復坐奮發精神調息歸根息歸則氣生氣生則神居神居則日久睡魔自退一坐久或自身覺得眞氣自下而上徃來升降或腎作熱或身覺跳動止是眞氣漸聚偶然如此不可以爲竒時聽其自然一坐久夜間忽然開合眼中見光如日月燈明或一片光明久而漸滅或忽然而滅此乃神光妄想非眞境界不可忍著一坐久或見山林城市平日中極愛人物及極嫌人物皆是見處未盡妄想現前掃去莫理一坐久形神忽忘身中或有眞境界不可為好認箸心即生魔一入室坐中日久忽然心旺胡見亂見不得胡說與人此是神識所使如心旺不得遏時放寛些子要人驚覺一覺便散一坐中忽有小小不快可以収拾身心調理驅除如打睚不過且放一調理安可緩緩再坐一蝸之氣不能敵天地寒暑氣候切莫傷生一坐久純熟忽然有一無位眞人忽岀忽沒聴其自然不得認著依前是病雖然如是病眼空花休錯認一場攞任縱横躍初夙慕玄風篤恭至道欲陶三尺劔寜棄六斗塵願旣五從學當心溥得遇紙舟先生印以全眞之妙何以大道之書不敢專笑於私是用廣流於衆解黏去縛斷妄除疑若是心法隻明一見如指諸掌必求泥於圓相恰如水裏珠回光返照即全眞當機借事而喻理末後翻身句作麽生會一眞絶點七眞非東海泥龍吼紫龜透得元和關捩子滿天霜月夜鳥啼紙舟先生全眞直指
